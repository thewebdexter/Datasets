name: Update Threat Intelligence Feeds

on:
  schedule:
    - cron: '0 */6 * * *'   # Every 6 hours
  workflow_dispatch:          # Allow manual runs

permissions:
  contents: write

jobs:
  update-feeds:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install requests tldextract

      - name: Download & merge feeds
        env:
          PHISHTANK_API_KEY: ${{ secrets.PHISHTANK_API_KEY }}   # optional – remove if unused
        run: python scripts/build_feed.py

      - name: Commit & push dataset
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/master_feed.json data/feed_meta.json
          git diff --cached --quiet || git commit -m "chore: update threat feeds [$(date -u +'%Y-%m-%d %H:%M UTC')]"
          git push
